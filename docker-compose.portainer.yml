services:
  testnet-builder:
    build:
      context: .
    image: zenon-testnet-builder:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      TZ: ${TZ:-Etc/UTC}
      PORT: 8787
      DATA_DIR: /app/data
      APP_SECRET: ${APP_SECRET:?Set APP_SECRET in the Portainer stack environment}
      COOKIE_SECURE: "true"
      GO_ZENON_REPO: ${GO_ZENON_REPO:-https://github.com/zenon-network/go-zenon.git}
      GO_ZENON_REF: ${GO_ZENON_REF:-master}
      DEPLOYMENT_REPO: ${DEPLOYMENT_REPO:-https://github.com/hypercore-one/deployment.git}
      DEPLOYMENT_REF: ${DEPLOYMENT_REF:-main}
    volumes:
      - zenon_testnet_builder_data:/app/data
    expose:
      - "8787"
    networks:
      - root_proxy-net
    labels:
      - "caddy=${TESTNET_HOST:-testnet.zenon.info}"
      - "caddy.encode=zstd gzip"
      - "caddy.reverse_proxy={{upstreams 8787}}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8787/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1

networks:
  root_proxy-net:
    name: root_proxy-net
    external: true

volumes:
  zenon_testnet_builder_data:
